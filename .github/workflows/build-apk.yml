name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: android-actions/setup-android@v3

      - name: Debug SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ls $ANDROID_HOME/platforms/ || echo "No platforms"
          ls $ANDROID_HOME/build-tools/ || echo "No build-tools"
          which sdkmanager || echo "No sdkmanager"
          yes | sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5

      - name: Install & build
        run: |
          npm ci
          echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          npm run build
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coderdy-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' && success()
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            **Coderdy Attendance APK** — v1.0.${{ github.run_number }}
          make_latest: true
