name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Android cmdline-tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install npm deps
        run: npm ci

      - name: Build .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Build web
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export ANDROID_HOME=$HOME/android-sdk
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coderdy-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' && success()
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            **Coderdy Attendance APK** — v1.0.${{ github.run_number }}
            Auto build from commit ${{ github.sha }}
          make_latest: true
